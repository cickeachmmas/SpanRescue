name: span_rescue
description: SPAN Rescue — Tactical Mesh Network for Emergency Rescue
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Wi-Fi Direct
  flutter_p2p_connection: ^2.0.0

  # Offline Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Audio
  record: ^6.0.0
  audioplayers: ^6.0.0

  # Storage
  shared_preferences: ^2.2.3

  # UUID
  uuid: ^4.4.0

  # Permissions
  permission_handler: ^11.3.1

  # GPS
  geolocator: ^11.0.0

  # Battery
  battery_plus: ^6.0.1

  # Icons & SVG
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.2

  # Date/Time
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  vibration: ^2.0.0

  # Network
  network_info_plus: ^7.0.0

  # File paths
  path_provider: ^2.1.3
  path: ^1.9.0

  # JSON
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
